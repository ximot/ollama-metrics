global:
  scrape_interval: 1m

scrape_configs:
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'ollama'
    scrape_interval: 15s  # More frequent scraping for Ollama
    # metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:8080']
